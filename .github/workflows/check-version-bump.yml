name: Check Version Bump PR

on:
  pull_request:
    paths:
      - 'amazon_sp_cli/__init__.py'

jobs:
  check-isolated-version-bump:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify version bump is isolated
        run: |
          CHANGED_FILES=$(git diff --name-only origin/main HEAD)

          if ! echo "$CHANGED_FILES" | grep -q '^amazon_sp_cli/__init__\.py$'; then
            echo "⏭️ amazon_sp_cli/__init__.py not changed; skipping version bump isolation check."
            exit 0
          fi

          OTHER_FILES=$(echo "$CHANGED_FILES" | grep -vE '^amazon_sp_cli/__init__\.py$|^\.github/workflows/' || true)

          if [ -n "$OTHER_FILES" ]; then
            echo "❌ Version bump PRs must only modify amazon_sp_cli/__init__.py (and workflow files)."
            echo "Found other changed files:"
            echo "$OTHER_FILES"
            exit 1
          fi

          echo "✅ Version bump is isolated."
